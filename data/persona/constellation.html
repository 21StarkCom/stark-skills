<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stark-persona — constellation map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #08080d; font-family: 'Inter', sans-serif; color: #e2e8f0; }
canvas { display: block; cursor: grab; }
canvas:active { cursor: grabbing; }

#title {
  position: fixed; top: 28px; left: 32px; z-index: 10; pointer-events: none;
}
#title h1 {
  font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 500;
  letter-spacing: 0.08em; color: #e2e8f0;
  text-shadow: 0 0 20px rgba(96,165,250,0.3);
}
#title .subtitle {
  font-size: 12px; font-weight: 300; color: #64748b; letter-spacing: 0.15em;
  margin-top: 4px; text-transform: uppercase;
}

#hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10;
  font-size: 12px; color: #475569; letter-spacing: 0.06em; pointer-events: none;
  font-family: 'JetBrains Mono', monospace;
}

#tooltip {
  position: fixed; z-index: 100; pointer-events: none;
  background: rgba(15,15,25,0.95); border: 1px solid rgba(100,116,139,0.25);
  border-radius: 12px; padding: 16px 20px; max-width: 340px;
  backdrop-filter: blur(16px); box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  display: none; transition: opacity 0.15s;
}
#tooltip.pinned { pointer-events: auto; }
#tooltip .tt-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
#tooltip .tt-source { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
#tooltip .tt-badge {
  display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px;
  border-radius: 10px; text-transform: uppercase; letter-spacing: 0.06em;
  margin-bottom: 10px;
}
#tooltip .tt-badge.character { background: rgba(96,165,250,0.15); color: #60a5fa; }
#tooltip .tt-badge.person { background: rgba(251,191,36,0.15); color: #fbbf24; }
#tooltip .tt-catchphrase {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #94a3b8;
  font-style: italic; margin-bottom: 10px; line-height: 1.5;
  border-left: 2px solid; padding-left: 10px;
}
#tooltip .tt-style { font-size: 12px; color: #cbd5e1; line-height: 1.5; margin-bottom: 10px; }
#tooltip .tt-traits { display: flex; flex-wrap: wrap; gap: 4px; }
#tooltip .tt-trait {
  font-size: 10px; padding: 2px 7px; border-radius: 6px;
  background: rgba(100,116,139,0.15); color: #94a3b8;
}
</style>
</head>
<body>

<div id="hint">scroll to zoom &middot; drag to pan &middot; hover a star to explore</div>

      { name: "Udi Kagan", source: "Israeli comedian, Zehu Ze!", type: "person", traits: ["absurd","physical","childlike","manic","lovable"], catchphrase: "Mah karah po?!", style: "Pure chaos energy channeled through rubber-faced physical comedy. Characters that shouldn't work but become iconic through sheer commitment." },

    ]
  },

    stars: [
      { name: "Guri Alfi", source: "Eretz Nehederet", type: "person", traits: ["deadpan","cynical","dry","observational","understated"], catchphrase: "Right. No.", style: "Understatement as comedy." },
      { name: "Lior Raz", source: "Fauda (2015)", type: "person", traits: ["intense","direct","physical","loyal","impatient"], catchphrase: "End of story.", style: "Mission briefing sentences." },
      { name: "Shoshana", source: "HaShminiya (2012)", type: "character", traits: ["dramatic","blunt","emotional","loyal","opinionated"], catchphrase: "Not normal!", style: "Zero filter, maximum volume." }
    ]
  },
  {
    name: "Detective", color: "#2dd4bf",
    stars: [
      { name: "Sherlock Holmes", source: "Sherlock (BBC, 2010)", type: "character", traits: ["brilliant","impatient","condescending","analytical","eccentric"], catchphrase: "Obviously.", style: "Rapid-fire deductions." }
    ]
  },
  {
    name: "Games", color: "#4ade80",
    stars: [
      { name: "GLaDOS", source: "Portal (2007)", type: "character", traits: ["passive-aggressive","sadistic","clinical","witty","backhanded"], catchphrase: "The cake is a lie.", style: "Sweetly menacing, compliments that are insults." }
    ]
  }

// Layout positions for constellations (normalized 0-1, will be scaled to canvas)
const layouts = {
  "Tarantino":        { cx: 0.15, cy: 0.15 },
  "Drama":            { cx: 0.42, cy: 0.12 },
  "Comedy":           { cx: 0.72, cy: 0.13 },
  "Sci-Fi / Fantasy": { cx: 0.88, cy: 0.35 },
  "Action":           { cx: 0.78, cy: 0.60 },
  "Standup US":       { cx: 0.15, cy: 0.50 },
  "Standup UK":       { cx: 0.30, cy: 0.68 },
  "Standup IL":       { cx: 0.12, cy: 0.78 },
  "Israeli":          { cx: 0.50, cy: 0.78 },
  "Detective":        { cx: 0.45, cy: 0.42 },
  "Games":            { cx: 0.62, cy: 0.38 }
};

const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

let W, H;
let camX = 0, camY = 0, zoom = 1;
let dragging = false, dragStartX, dragStartY, camStartX, camStartY;
let pinnedStar = null;
let hoveredStar = null;
let bgStars = [];
let time = 0;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

// Generate background stars
function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 200; i++) {
    bgStars.push({
      x: Math.random() * 3000 - 500,
      y: Math.random() * 2000 - 300,
      r: Math.random() * 1.2 + 0.3,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2,
      brightness: Math.random() * 0.4 + 0.15
    });
  }
}

// Place stars around constellation centers
function initStarPositions() {
  const baseW = 1800, baseH = 1100;
  constellations.forEach(c => {
    const lay = layouts[c.name];
    const cx = lay.cx * baseW, cy = lay.cy * baseH;
    const n = c.stars.length;
    c.stars.forEach((s, i) => {
      const angle = (i / n) * Math.PI * 2 + (c.name.charCodeAt(0) * 0.5);
      const dist = 35 + Math.random() * 30 + (n > 4 ? 15 : 0);
      s.x = cx + Math.cos(angle) * dist;
      s.y = cy + Math.sin(angle) * dist;
      s.baseX = s.x;
      s.baseY = s.y;
      s.radius = 4;
      s.twinkleSpeed = Math.random() * 0.015 + 0.008;
      s.twinkleOffset = Math.random() * Math.PI * 2;
      s.driftAngle = Math.random() * Math.PI * 2;
      s.driftSpeed = Math.random() * 0.0003 + 0.0001;
      s.driftRadius = Math.random() * 3 + 1;
      s.constellation = c;
    });
    c.labelX = cx;
    c.labelY = cy - (n > 4 ? 80 : 60);
  });
}

function worldToScreen(wx, wy) {
  return [(wx - camX) * zoom + W / 2, (wy - camY) * zoom + H / 2];
}

function screenToWorld(sx, sy) {
  return [(sx - W / 2) / zoom + camX, (sy - H / 2) / zoom + camY];
}

function drawBgStars() {
  bgStars.forEach(s => {
    const [sx, sy] = worldToScreen(s.x, s.y);
    if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) return;
    const twinkle = Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.5 + 0.5;
    const alpha = s.brightness * (0.5 + twinkle * 0.5);
    ctx.beginPath();
    ctx.arc(sx, sy, s.r * zoom, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 210, 230, ${alpha})`;
    ctx.fill();
  });
}

function drawConstellationLines() {
  constellations.forEach(c => {
    if (c.stars.length < 2) return;
    ctx.strokeStyle = c.color + '30';
    ctx.lineWidth = 1 * zoom;
    // Connect stars in order, forming a path
    for (let i = 0; i < c.stars.length - 1; i++) {
      const [x1, y1] = worldToScreen(c.stars[i].x, c.stars[i].y);
      const [x2, y2] = worldToScreen(c.stars[i + 1].x, c.stars[i + 1].y);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    // Also connect last to first for groups of 3+
    if (c.stars.length >= 3) {
      const first = c.stars[0], last = c.stars[c.stars.length - 1];
      const [x1, y1] = worldToScreen(last.x, last.y);
      const [x2, y2] = worldToScreen(first.x, first.y);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
  });
}

function drawStars() {
  constellations.forEach(c => {
    c.stars.forEach(s => {
      const [sx, sy] = worldToScreen(s.x, s.y);
      if (sx < -50 || sx > W + 50 || sy < -50 || sy > H + 50) return;

      const twinkle = Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.5 + 0.5;
      const isHovered = (s === hoveredStar || s === pinnedStar);
      const baseR = s.radius * zoom;
      const r = isHovered ? baseR * 1.6 : baseR * (0.9 + twinkle * 0.2);

      // Outer glow
      const glowR = r * (isHovered ? 6 : 4);
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR);
      const alpha = isHovered ? 0.35 : 0.12 + twinkle * 0.08;
      grad.addColorStop(0, c.color + (isHovered ? '90' : '50'));
      grad.addColorStop(0.4, c.color + '20');
      grad.addColorStop(1, c.color + '00');
      ctx.beginPath();
      ctx.arc(sx, sy, glowR, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Core
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      const coreGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
      coreGrad.addColorStop(0, '#ffffff');
      coreGrad.addColorStop(0.5, c.color);
      coreGrad.addColorStop(1, c.color + 'aa');
      ctx.fillStyle = coreGrad;
      ctx.fill();
    });
  });
}

function drawLabels() {
  constellations.forEach(c => {
    const [sx, sy] = worldToScreen(c.labelX, c.labelY);
    if (sx < -100 || sx > W + 100 || sy < -50 || sy > H + 50) return;
    ctx.font = `500 ${Math.max(10, 11 * zoom)}px 'JetBrains Mono', monospace`;
    ctx.fillStyle = c.color + '90';
    ctx.textAlign = 'center';
    ctx.letterSpacing = '0.1em';
    ctx.fillText(c.name.toUpperCase(), sx, sy);
  });
}

function findStarAt(mx, my) {
  const [wx, wy] = screenToWorld(mx, my);
  let closest = null, closestDist = Infinity;
  constellations.forEach(c => {
    c.stars.forEach(s => {
      const d = Math.hypot(s.x - wx, s.y - wy);
      const hitR = (s.radius + 8) / zoom;
      if (d < hitR && d < closestDist) {
        closest = s;
        closestDist = d;
      }
    });
  });
  return closest;
}

function showTooltip(star, mx, my) {
  const c = star.constellation;
  let html = `<div class="tt-name" style="color:${c.color}">${star.name}</div>`;
  html += `<div class="tt-source">${star.source}</div>`;
  html += `<span class="tt-badge ${star.type}">${star.type}</span>`;
  if (star.catchphrase) {
    html += `<div class="tt-catchphrase" style="border-color:${c.color}50">"${star.catchphrase}"</div>`;
  }
  html += `<div class="tt-style">${star.style}</div>`;
  html += `<div class="tt-traits">`;
  star.traits.forEach(t => { html += `<span class="tt-trait">${t}</span>`; });
  html += `</div>`;
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';

  // Position
  const pad = 16;
  let tx = mx + 18, ty = my - 10;
  const rect = tooltip.getBoundingClientRect();
  if (tx + rect.width > W - pad) tx = mx - rect.width - 18;
  if (ty + rect.height > H - pad) ty = H - pad - rect.height;
  if (ty < pad) ty = pad;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
  tooltip.classList.remove('pinned');
}

function updateDrift() {
  constellations.forEach(c => {
    c.stars.forEach(s => {
      s.x = s.baseX + Math.cos(time * s.driftSpeed + s.driftAngle) * s.driftRadius;
      s.y = s.baseY + Math.sin(time * s.driftSpeed * 1.3 + s.driftAngle) * s.driftRadius;
    });
  });
}

function draw() {
  time++;
  updateDrift();

  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.7);
  bg.addColorStop(0, '#0d0d18');
  bg.addColorStop(1, '#08080d');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawBgStars();
  drawConstellationLines();
  drawStars();
  drawLabels();

  requestAnimationFrame(draw);
}

// Events
canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  camStartX = camX;
  camStartY = camY;
});

window.addEventListener('mousemove', e => {
  if (dragging) {
    camX = camStartX - (e.clientX - dragStartX) / zoom;
    camY = camStartY - (e.clientY - dragStartY) / zoom;
  } else {
    const star = findStarAt(e.clientX, e.clientY);
    if (star) {
      hoveredStar = star;
      canvas.style.cursor = 'pointer';
      if (!pinnedStar) showTooltip(star, e.clientX, e.clientY);
    } else {
      hoveredStar = null;
      canvas.style.cursor = 'grab';
      if (!pinnedStar) hideTooltip();
    }
  }
});

window.addEventListener('mouseup', e => {
  if (dragging && Math.hypot(e.clientX - dragStartX, e.clientY - dragStartY) < 4) {
    // It was a click, not a drag
    const star = findStarAt(e.clientX, e.clientY);
    if (star) {
      if (pinnedStar === star) {
        pinnedStar = null;
        hideTooltip();
      } else {
        pinnedStar = star;
        tooltip.classList.add('pinned');
        showTooltip(star, e.clientX, e.clientY);
      }
    } else {
      pinnedStar = null;
      hideTooltip();
    }
  }
  dragging = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.min(5, Math.max(0.3, zoom * factor));
  // Zoom towards cursor
  const [wx, wy] = screenToWorld(e.clientX, e.clientY);
  zoom = newZoom;
  camX = wx - (e.clientX - W / 2) / zoom;
  camY = wy - (e.clientY - H / 2) / zoom;
}, { passive: false });

// Center camera on content
function centerCamera() {
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  constellations.forEach(c => c.stars.forEach(s => {
    minX = Math.min(minX, s.x); maxX = Math.max(maxX, s.x);
    minY = Math.min(minY, s.y); maxY = Math.max(maxY, s.y);
  }));
  camX = (minX + maxX) / 2;
  camY = (minY + maxY) / 2;
  const spanX = (maxX - minX + 200) / W;
  const spanY = (maxY - minY + 200) / H;
  zoom = 1 / Math.max(spanX, spanY);
  zoom = Math.min(zoom, 1.2);
}

window.addEventListener('resize', resize);
resize();
initBgStars();
initStarPositions();
centerCamera();
draw();
</script>
</body>
